[build]
  command = "npm run build"
  publish = "dist"

# Production: keep Create PPT and Architecture hidden (code ships; flags opt-in only)
[build.environment]
  VITE_ENABLE_PPT_MASTER = "false"
  VITE_ENABLE_ARCHITECTURE = "false"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Auth API — must come before SPA fallback
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
