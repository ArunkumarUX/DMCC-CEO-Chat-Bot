[build]
  base = "."
  command = "npm ci && npm run build"
  publish = "dist"

# Optional overrides (production builds ignore these — see src/config/features.ts)
[build.environment]
  VITE_ENABLE_PPT_MASTER = "false"
  VITE_ENABLE_ARCHITECTURE = "false"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Auth API — must come before SPA fallback
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Always fetch fresh index.html after deploy (JS bundles are hashed)
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/build-info.json"
  [headers.values]
    Cache-Control = "no-cache"
